build:
  nodes:
    analysis:
      environment:
        php:
          version: 8.1
          ini:
            xdebug.mode: coverage
          extensions:
            - redis
            - memcached

      dependencies:
        before:
          - curl -sS https://getcomposer.org/installer | php -- --install-dir=$HOME --filename=composer --2
          - $HOME/composer install --prefer-dist --no-interaction --no-progress
          - sudo service redis-server start
          - sudo service memcached start

      tests:
        override:
          - php-scrutinizer-run
          - command: vendor/bin/phpunit --coverage-clover=coverage.xml
            coverage:
              file: coverage.xml
              format: clover
          - command: phpcs-run
            use_website_config: true

filter:
  excluded_paths:
    - "tests/*"
    - "vendor/*"

checks:
  php: true

coding_style:
  php:
    spaces:
      around_operators:
        concatenation: true